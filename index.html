<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Just Weight</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    :root {
      --bg: #f7f2ea;
      --card: #fffdf9;
      --text: #24211d;
      --muted: #8a7f73;
      --line: #eadfce;
      --accent: #a77f5f;
      --accent-dark: #73563f;
      --soft: #efe4d4;
      --good: #5f8f72;
      --warn: #b8844e;
      --bad: #c57272;
      --shadow: 0 14px 36px rgba(93, 66, 39, 0.10);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans TC", sans-serif;
      background: radial-gradient(circle at top, #fffdf8 0%, var(--bg) 55%, #f0e6d8 100%);
      color: var(--text);
    }

    .app {
      width: min(980px, 100%);
      margin: 0 auto;
      padding: 18px 16px 42px;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 14px;
    }

    @media (min-width: 820px) {
      .grid.two { grid-template-columns: 0.9fr 1.1fr; }
    }

    .card {
      background: rgba(255,253,249,0.94);
      border: 1px solid var(--line);
      border-radius: 24px;
      padding: 18px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(10px);
    }

    .card h2 {
      margin: 0 0 14px;
      font-size: 18px;
      letter-spacing: -0.2px;
    }

    label {
      display: block;
      margin: 13px 0 7px;
      color: var(--muted);
      font-size: 13px;
      font-weight: 600;
    }

    input {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 17px;
      padding: 14px 15px;
      font-size: 18px;
      outline: none;
      background: #fff;
      color: var(--text);
    }

    input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 4px rgba(167, 127, 95, 0.13);
    }

    button {
      width: 100%;
      border: 0;
      border-radius: 17px;
      padding: 15px 16px;
      margin-top: 14px;
      font-size: 16px;
      font-weight: 800;
      color: #fff;
      background: var(--accent);
      cursor: pointer;
    }

    button:active { transform: scale(0.99); }
    button.secondary { background: #ddd0bd; color: var(--accent-dark); }
    button.danger { background: #c97b7b; color: #fff; }

    .stats {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 10px;
    }

    @media (min-width: 620px) {
      .stats { grid-template-columns: repeat(4, 1fr); }
    }

    .stat {
      background: #fbf6ee;
      border: 1px solid var(--line);
      border-radius: 19px;
      padding: 14px;
      min-height: 84px;
    }

    .stat .label {
      color: var(--muted);
      font-size: 12px;
      margin-bottom: 8px;
    }

    .stat .value {
      font-size: 23px;
      font-weight: 900;
      letter-spacing: -0.6px;
    }

    .hint {
      margin-top: 13px;
      padding: 13px 14px;
      border-radius: 17px;
      font-size: 14px;
      line-height: 1.45;
      background: #f6ecdf;
      color: var(--accent-dark);
      border: 1px solid #ead8c4;
    }

    .hint.good { background: #edf7f0; color: var(--good); border-color: #d4e8da; }
    .hint.warn { background: #fff4e5; color: var(--warn); border-color: #efd8bb; }
    .hint.bad { background: #fff0f0; color: var(--bad); border-color: #edcece; }

    .chart-wrap {
      height: 360px;
      position: relative;
    }

    .month-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 7px;
    }

    .day-name, .day {
      text-align: center;
      font-size: 12px;
      color: var(--muted);
    }

    .day {
      min-height: 44px;
      border-radius: 14px;
      border: 1px solid var(--line);
      background: #fff;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 2px;
    }

    .day.empty { border: none; background: transparent; }
    .day.down { background: #edf7f0; color: var(--good); border-color: #d4e8da; }
    .day.up { background: #fff0f0; color: var(--bad); border-color: #edcece; }
    .day.same { background: #f7f1e8; color: var(--accent-dark); }

    .day .num { font-weight: 800; font-size: 13px; }
    .day .kg { font-size: 10px; }

    .history {
      display: flex;
      flex-direction: column;
      gap: 8px;
      max-height: 270px;
      overflow: auto;
    }

    .record {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      padding: 12px 0;
      border-bottom: 1px solid var(--line);
      font-size: 14px;
    }

    .record strong { font-size: 17px; }
    .muted { color: var(--muted); }

    .row {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .row button {
      width: auto;
      margin: 0;
      padding: 9px 12px;
      border-radius: 12px;
      font-size: 13px;
    }

    .footer-note {
      text-align: center;
      color: var(--muted);
      font-size: 12px;
      margin-top: 20px;
    }
  </style>
</head>
<body>
  <main class="app">
    <section class="grid two">
      <div class="card">
        <h2>今天的紀錄</h2>

        <label for="dateInput">日期</label>
        <input id="dateInput" type="date" />

        <label for="weightInput">體重 kg</label>
        <input id="weightInput" type="number" inputmode="decimal" step="0.1" placeholder="例如 50.8" />

        <label for="targetMinInput">目標區間下限 kg</label>
        <input id="targetMinInput" type="number" inputmode="decimal" step="0.1" />

        <label for="targetMaxInput">目標區間上限 kg</label>
        <input id="targetMaxInput" type="number" inputmode="decimal" step="0.1" />

        <button onclick="saveEntry()">儲存 / 更新</button>
        <button class="secondary" onclick="fillDemoData()">載入範例資料</button>
        <button class="danger" onclick="clearAllData()">清空全部資料</button>

        <div id="message" class="hint">每天只要輸入一次體重即可。重點看 7 日與 14 日平均，不看單日波動。</div>
      </div>

      <div class="card">
        <h2>本週 Summary</h2>
        <div class="stats">
          <div class="stat"><div class="label">最新體重</div><div class="value" id="latestWeight">--</div></div>
          <div class="stat"><div class="label">7日平均</div><div class="value" id="avg7">--</div></div>
          <div class="stat"><div class="label">14日平均</div><div class="value" id="avg14">--</div></div>
          <div class="stat"><div class="label">週變化</div><div class="value" id="weeklyChange">--</div></div>
        </div>
        <div id="trendHint" class="hint">資料累積後，這裡會自動判斷趨勢。</div>
      </div>
    </section>

    <section class="card" style="margin-top:14px;">
      <h2>趨勢圖</h2>
      <div class="chart-wrap">
        <canvas id="weightChart"></canvas>
      </div>
    </section>

    <section class="grid two" style="margin-top:14px;">
      <div class="card">
        <h2>月曆視覺化</h2>
        <div class="month-grid" id="calendar"></div>
      </div>

      <div class="card">
        <h2>歷史紀錄</h2>
        <div class="history" id="history"></div>
      </div>
    </section>

    <p class="footer-note">資料只存在此瀏覽器 localStorage，不會上傳。</p>
  </main>

  <script>
    const STORAGE_KEY = "weightTrendEntriesV2";
    const TARGET_KEY = "weightTrendTargetV2";
    let chart;

    const $ = (id) => document.getElementById(id);

    function todayString() {
      const d = new Date();
      const offset = d.getTimezoneOffset();
      const local = new Date(d.getTime() - offset * 60000);
      return local.toISOString().slice(0, 10);
    }

    function formatDate(dateStr) {
      const d = new Date(dateStr + "T00:00:00");
      return `${d.getMonth() + 1}/${d.getDate()}`;
    }

    function getEntries() {
      return JSON.parse(localStorage.getItem(STORAGE_KEY) || "[]")
        .sort((a, b) => a.date.localeCompare(b.date));
    }

    function setEntries(entries) {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(entries));
    }

    function getTarget() {
      return JSON.parse(localStorage.getItem(TARGET_KEY) || "{\"min\":48,\"max\":50}");
    }

    function setTarget(min, max) {
      localStorage.setItem(TARGET_KEY, JSON.stringify({ min, max }));
    }

    function movingAverage(entries, index, days) {
      const slice = entries.slice(Math.max(0, index - days + 1), index + 1);
      if (!slice.length) return null;
      const sum = slice.reduce((acc, item) => acc + item.weight, 0);
      return +(sum / slice.length).toFixed(2);
    }

    function saveEntry() {
      const date = $("dateInput").value;
      const weight = Number($("weightInput").value);
      const targetMin = Number($("targetMinInput").value);
      const targetMax = Number($("targetMaxInput").value);

      if (!date || !weight || weight <= 0) {
        showMessage("請輸入有效日期與體重。", "bad");
        return;
      }

      if (targetMin && targetMax && targetMin < targetMax) {
        setTarget(targetMin, targetMax);
      }

      const entries = getEntries();
      const existing = entries.find((item) => item.date === date);
      if (existing) existing.weight = weight;
      else entries.push({ date, weight });

      setEntries(entries);
      $("weightInput").value = "";
      showMessage("已儲存。看趨勢，不看單日波動。", "good");
      render();
    }

    function deleteEntry(date) {
      const entries = getEntries().filter((item) => item.date !== date);
      setEntries(entries);
      render();
    }

    function clearAllData() {
      if (!confirm("確定要清空所有體重資料嗎？")) return;
      localStorage.removeItem(STORAGE_KEY);
      render();
      showMessage("資料已清空。", "warn");
    }

    function fillDemoData() {
      const base = new Date();
      const demo = [];
      for (let i = 27; i >= 0; i--) {
        const d = new Date(base);
        d.setDate(base.getDate() - i);
        const date = d.toISOString().slice(0, 10);
        const trend = 51.2 - (27 - i) * 0.035;
        const noise = Math.sin(i * 1.7) * 0.25;
        demo.push({ date, weight: +(trend + noise).toFixed(1) });
      }
      setEntries(demo);
      render();
      showMessage("已載入範例資料，可先看圖表效果。", "good");
    }

    function showMessage(text, type = "") {
      const el = $("message");
      el.className = `hint ${type}`;
      el.textContent = text;
    }

    function renderStats(entries) {
      if (!entries.length) {
        $("latestWeight").textContent = "--";
        $("avg7").textContent = "--";
        $("avg14").textContent = "--";
        $("weeklyChange").textContent = "--";
        $("trendHint").className = "hint";
        $("trendHint").textContent = "資料累積後，這裡會自動判斷趨勢。";
        return;
      }

      const latest = entries[entries.length - 1];
      const avg7 = movingAverage(entries, entries.length - 1, 7);
      const avg14 = movingAverage(entries, entries.length - 1, 14);
      const prevIndex = Math.max(0, entries.length - 8);
      const weeklyChange = +(latest.weight - entries[prevIndex].weight).toFixed(1);

      $("latestWeight").textContent = `${latest.weight.toFixed(1)}`;
      $("avg7").textContent = avg7 ? avg7.toFixed(1) : "--";
      $("avg14").textContent = avg14 ? avg14.toFixed(1) : "--";
      $("weeklyChange").textContent = `${weeklyChange > 0 ? "+" : ""}${weeklyChange.toFixed(1)}`;

      const hint = $("trendHint");
      if (entries.length < 7) {
        hint.className = "hint";
        hint.textContent = "先累積 7 天資料，趨勢會更準。";
      } else if (latest.weight > avg7 + 0.6) {
        hint.className = "hint warn";
        hint.textContent = "今日體重明顯高於 7 日平均，較像水分、鹽分或週期波動。";
      } else if (avg7 < avg14 - 0.15) {
        hint.className = "hint good";
        hint.textContent = "7 日平均低於 14 日平均，短期趨勢正在往下。";
      } else if (avg7 > avg14 + 0.15) {
        hint.className = "hint bad";
        hint.textContent = "7 日平均高於 14 日平均，近期趨勢偏上。先檢查水分、鹽分、睡眠與週期。";
      } else {
        hint.className = "hint";
        hint.textContent = "目前趨勢大致持平。單日波動不用放大。";
      }
    }

    function renderChart(entries) {
      const target = getTarget();
      const labels = entries.map((item) => formatDate(item.date));
      const weights = entries.map((item) => item.weight);
      const avg7 = entries.map((_, index) => movingAverage(entries, index, 7));
      const avg14 = entries.map((_, index) => movingAverage(entries, index, 14));
      const targetMin = entries.map(() => target.min);
      const targetMax = entries.map(() => target.max);

      const ctx = $("weightChart").getContext("2d");
      if (chart) chart.destroy();
      chart = new Chart(ctx, {
        type: "line",
        data: {
          labels,
          datasets: [
            { label: "體重", data: weights, tension: 0.35, borderWidth: 2.5, pointRadius: 4 },
            { label: "7日平均", data: avg7, tension: 0.35, borderWidth: 2.5, pointRadius: 0 },
            { label: "14日平均", data: avg14, tension: 0.35, borderWidth: 2.5, pointRadius: 0 },
            { label: "目標下限", data: targetMin, borderDash: [6, 6], pointRadius: 0, borderWidth: 1.5 },
            { label: "目標上限", data: targetMax, borderDash: [6, 6], pointRadius: 0, borderWidth: 1.5 }
          ]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          plugins: {
            legend: { position: "bottom" },
            tooltip: { mode: "index", intersect: false }
          },
          interaction: { mode: "nearest", axis: "x", intersect: false },
          scales: {
            y: {
              suggestedMin: weights.length ? Math.min(...weights, target.min) - 1 : undefined,
              suggestedMax: weights.length ? Math.max(...weights, target.max) + 1 : undefined,
              ticks: { callback: (value) => `${value} kg` }
            }
          }
        }
      });
    }

    function renderCalendar(entries) {
      const cal = $("calendar");
      cal.innerHTML = "";
      const names = ["日", "一", "二", "三", "四", "五", "六"];
      names.forEach((name) => {
        const el = document.createElement("div");
        el.className = "day-name";
        el.textContent = name;
        cal.appendChild(el);
      });

      const today = new Date();
      const year = today.getFullYear();
      const month = today.getMonth();
      const first = new Date(year, month, 1);
      const last = new Date(year, month + 1, 0);
      const byDate = Object.fromEntries(entries.map((item) => [item.date, item]));

      for (let i = 0; i < first.getDay(); i++) {
        const empty = document.createElement("div");
        empty.className = "day empty";
        cal.appendChild(empty);
      }

      let prevWeight = null;
      for (let day = 1; day <= last.getDate(); day++) {
        const dateObj = new Date(year, month, day);
        const dateStr = dateObj.toISOString().slice(0, 10);
        const item = byDate[dateStr];
        const el = document.createElement("div");
        el.className = "day";

        if (item && prevWeight !== null) {
          const diff = +(item.weight - prevWeight).toFixed(1);
          if (diff < -0.1) el.classList.add("down");
          else if (diff > 0.1) el.classList.add("up");
          else el.classList.add("same");
        } else if (item) {
          el.classList.add("same");
        }

        el.innerHTML = `<div class="num">${day}</div>${item ? `<div class="kg">${item.weight.toFixed(1)}</div>` : ""}`;
        cal.appendChild(el);
        if (item) prevWeight = item.weight;
      }
    }

    function renderHistory(entries) {
      const box = $("history");
      if (!entries.length) {
        box.innerHTML = `<div class="muted">尚無資料。</div>`;
        return;
      }
      box.innerHTML = entries.slice().reverse().map((item) => `
        <div class="record">
          <div>
            <div class="muted">${item.date}</div>
            <strong>${item.weight.toFixed(1)} kg</strong>
          </div>
          <div class="row">
            <button class="secondary" onclick="editEntry('${item.date}', ${item.weight})">編輯</button>
            <button class="danger" onclick="deleteEntry('${item.date}')">刪除</button>
          </div>
        </div>
      `).join("");
    }

    function editEntry(date, weight) {
      $("dateInput").value = date;
      $("weightInput").value = weight;
      window.scrollTo({ top: 0, behavior: "smooth" });
    }

    function render() {
      const entries = getEntries();
      const target = getTarget();
      $("targetMinInput").value = target.min;
      $("targetMaxInput").value = target.max;
      renderStats(entries);
      renderChart(entries);
      renderCalendar(entries);
      renderHistory(entries);
    }

    function init() {
      $("dateInput").value = todayString();
      render();
    }

    init();
  </script>
</body>
</html>
