<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Just Weight</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    :root {
      --bg: #f7f2ea;
      --card: #fffdf9;
      --text: #24211d;
      --muted: #8a7f73;
      --line: #eadfce;
      --accent: #a77f5f;
      --accent-dark: #73563f;
      --soft: #efe4d4;
      --good: #5f8f72;
      --warn: #b8844e;
      --bad: #c57272;
      --shadow: 0 14px 36px rgba(93, 66, 39, 0.10);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans TC", sans-serif;
      background: radial-gradient(circle at top, #fffdf8 0%, var(--bg) 55%, #f0e6d8 100%);
      color: var(--text);
    }

    .app {
      width: min(980px, 100%);
      margin: 0 auto;
      padding: 18px 16px 42px;
    }

    .grid { display: grid; grid-template-columns: 1fr; gap: 14px; }
    @media (min-width: 820px) { .grid.two { grid-template-columns: 0.9fr 1.1fr; } }

    .card {
      background: rgba(255,253,249,0.94);
      border: 1px solid var(--line);
      border-radius: 24px;
      padding: 18px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(10px);
    }

    .card h2 { margin: 0 0 14px; font-size: 18px; letter-spacing: -0.2px; }

    label { display: block; margin: 13px 0 7px; color: var(--muted); font-size: 13px; font-weight: 600; }

    input {
      width: 100%; border: 1px solid var(--line); border-radius: 17px;
      padding: 14px 15px; font-size: 18px; outline: none; background: #fff; color: var(--text);
    }

    input:focus { border-color: var(--accent); box-shadow: 0 0 0 4px rgba(167, 127, 95, 0.13); }

    button {
      width: 100%; border: 0; border-radius: 17px; padding: 15px 16px; margin-top: 14px;
      font-size: 16px; font-weight: 800; color: #fff; background: var(--accent); cursor: pointer;
    }

    button:active { transform: scale(0.99); }
    button.secondary { background: #ddd0bd; color: var(--accent-dark); }
    button.danger { background: #c97b7b; color: #fff; }
    button.small { width: auto; margin: 0; padding: 8px 12px; font-size: 13px; border-radius: 12px; }

    .stats { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }
    @media (min-width: 620px) { .stats { grid-template-columns: repeat(4, 1fr); } }

    .stat { background: #fbf6ee; border: 1px solid var(--line); border-radius: 19px; padding: 14px; min-height: 84px; }
    .stat.alert { background: #fff0f0; border-color: #edcece; }
    .stat .label { color: var(--muted); font-size: 12px; margin-bottom: 8px; }
    .stat .value { font-size: 23px; font-weight: 900; letter-spacing: -0.6px; }

    .hint {
      margin-top: 13px; padding: 13px 14px; border-radius: 17px; font-size: 14px; line-height: 1.45;
      background: #f6ecdf; color: var(--accent-dark); border: 1px solid #ead8c4;
    }
    .hint.good { background: #edf7f0; color: var(--good); border-color: #d4e8da; }
    .hint.warn { background: #fff4e5; color: var(--warn); border-color: #efd8bb; }
    .hint.bad { background: #fff0f0; color: var(--bad); border-color: #edcece; }

    .chart-wrap { height: 360px; position: relative; }
    .range-box { background:#fbf6ee; border:1px solid var(--line); border-radius:20px; padding:16px; }
    .range-top { display:flex; justify-content:space-between; align-items:center; gap:12px; margin-bottom:14px; color:var(--accent-dark); }
    .range-top span { font-size:14px; font-weight:800; }
    .range-top strong { font-size:24px; }
    .range-track { position:relative; height:18px; border-radius:999px; background:linear-gradient(90deg, rgba(197,114,114,.22) 0%, rgba(197,114,114,.22) 18%, rgba(95,143,114,.22) 18%, rgba(95,143,114,.22) 82%, rgba(197,114,114,.22) 82%, rgba(197,114,114,.22) 100%); border:1px solid var(--line); }
    .range-safe { position:absolute; left:18%; width:64%; top:0; bottom:0; border-radius:999px; background:rgba(95,143,114,.18); }
    .range-dot { position:absolute; top:50%; width:24px; height:24px; border-radius:50%; background:var(--accent); transform:translate(-50%,-50%); box-shadow:0 4px 12px rgba(93,66,39,.22); border:3px solid #fff; }
    .range-dot.alert { background:var(--bad); }
    .range-labels { display:flex; justify-content:space-between; margin-top:10px; color:var(--muted); font-size:12px; font-weight:700; padding:0 18%; }
    .weekly-box { margin-top:12px; display:grid; grid-template-columns:1fr; gap:8px; }
    @media (min-width:620px){ .weekly-box { grid-template-columns:repeat(3,1fr); } }
    .week-card { background:#fff; border:1px solid var(--line); border-radius:18px; padding:13px; }
    .week-card .week-title { color:var(--muted); font-size:12px; margin-bottom:6px; }
    .week-card .week-value { font-size:20px; font-weight:900; }
    .week-card.good { background:#edf7f0; border-color:#d4e8da; color:var(--good); }
    .week-card.bad { background:#fff0f0; border-color:#edcece; color:var(--bad); }
    .week-card.neutral { background:#f7f1e8; color:var(--accent-dark); }

    .calendar-head { display: flex; justify-content: space-between; align-items: center; gap: 10px; margin-bottom: 12px; }
    .calendar-title { margin: 0; font-size: 15px; color: var(--accent-dark); font-weight: 900; }
    .calendar-actions { display: flex; gap: 8px; }

    .month-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 7px; }
    .day-name, .day { text-align: center; font-size: 12px; color: var(--muted); }
    .day {
      min-height: 48px; border-radius: 14px; border: 1px solid var(--line); background: #fff;
      display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 2px; cursor: pointer;
    }
    .day.empty { border: none; background: transparent; cursor: default; }
    .day.down { background: #edf7f0; color: var(--good); border-color: #d4e8da; }
    .day.up { background: #fff0f0; color: var(--bad); border-color: #edcece; }
    .day.same { background: #f7f1e8; color: var(--accent-dark); }
    .day.alert { background: #fff0f0; color: var(--bad); border-color: #edcece; font-weight: 900; }
    .day.selected { outline: 3px solid rgba(167,127,95,0.22); }
    .day .num { font-weight: 900; font-size: 13px; }
    .day .kg { font-size: 10px; }

    .history { display: flex; flex-direction: column; gap: 8px; max-height: 270px; overflow: auto; }
    .record { display: flex; justify-content: space-between; align-items: center; gap: 10px; padding: 12px 0; border-bottom: 1px solid var(--line); font-size: 14px; }
    .record strong { font-size: 17px; }
    .muted { color: var(--muted); }
    .row { display: flex; gap: 8px; align-items: center; }
    .row button { width: auto; margin: 0; padding: 9px 12px; border-radius: 12px; font-size: 13px; }
    .footer-note { text-align: center; color: var(--muted); font-size: 12px; margin-top: 20px; }
  </style>
</head>
<body>
  <main class="app">
    <section class="grid two">
      <div class="card">
        <h2>今天的紀錄</h2>

        <label for="dateInput">日期</label>
        <input id="dateInput" type="date" />

        <label for="weightInput">體重 kg</label>
        <input id="weightInput" type="number" inputmode="decimal" step="0.1" placeholder="例如 50.8" />

        <label for="targetMinInput">目標區間下限 kg</label>
        <input id="targetMinInput" type="number" inputmode="decimal" step="0.1" />

        <label for="targetMaxInput">目標區間上限 kg</label>
        <input id="targetMaxInput" type="number" inputmode="decimal" step="0.1" />

        <button onclick="saveEntry()">儲存 / 更新</button>
        <button class="secondary" onclick="fillDemoData()">載入範例資料</button>
        <button class="danger" onclick="clearAllData()">清空全部資料</button>

        <div id="message" class="hint">每天只要輸入一次體重即可。重點看 7 日與 14 日平均，不看單日波動。</div>
      </div>

      <div class="card">
        <h2>本週 Summary</h2>
        <div class="stats">
          <div class="stat"><div class="label">最新體重</div><div class="value" id="latestWeight">--</div></div>
          <div class="stat"><div class="label">7日平均</div><div class="value" id="avg7">--</div></div>
          <div class="stat"><div class="label">14日平均</div><div class="value" id="avg14">--</div></div>
          <div class="stat"><div class="label">週變化</div><div class="value" id="weeklyChange">--</div></div>
        </div>
        <div id="trendHint" class="hint">資料累積後，這裡會自動判斷趨勢。</div>
      </div>
    </section>

    <section class="card" style="margin-top:14px;">
      <h2>趨勢圖</h2>
      <div class="chart-wrap"><canvas id="weightChart"></canvas></div>
    </section>

    <section class="card" style="margin-top:14px;">
      <h2>目標區間判讀</h2>
      <div class="range-box">
        <div class="range-top">
          <span id="rangeStatus">--</span>
          <strong id="rangeCurrent">-- kg</strong>
        </div>
        <div class="range-track">
          <div class="range-safe"></div>
          <div class="range-dot" id="rangeDot"></div>
        </div>
        <div class="range-labels">
          <span>43 kg</span>
          <span>48 kg</span>
        </div>
      </div>
      <div class="weekly-box" id="weeklyDirectionBox"></div>
    </section>

    <section class="grid two" style="margin-top:14px;">
      <div class="card">
        <div class="calendar-head">
          <button class="secondary small" onclick="changeMonth(-1)">‹</button>
          <div id="calendarTitle" class="calendar-title"></div>
          <button class="secondary small" onclick="changeMonth(1)">›</button>
        </div>
        <div class="month-grid" id="calendar"></div>
        <div id="selectedDayInfo" class="hint">點月曆上的日期，可快速查看或編輯當天紀錄。</div>
      </div>

      <div class="card">
        <h2>歷史紀錄</h2>
        <div class="history" id="history"></div>
      </div>
    </section>

    <p class="footer-note">資料只存在此瀏覽器 localStorage，不會上傳。</p>
  </main>

  <script>
    const STORAGE_KEY = "weightTrendEntriesV3";
    const OLD_KEYS = ["weightTrendEntriesV2", "weightTrendEntriesV1"];
    const TARGET_KEY = "weightTrendTargetV3";
    const OLD_TARGET_KEYS = ["weightTrendTargetV2", "weightTrendTargetV1"];
    let chart;
    let calendarDate = new Date();
    let selectedDate = null;

    const $ = (id) => document.getElementById(id);

    function toLocalDateString(date) {
      const year = date.getFullYear();
      const month = String(date.getMonth() + 1).padStart(2, "0");
      const day = String(date.getDate()).padStart(2, "0");
      return `${year}-${month}-${day}`;
    }

    function todayString() { return toLocalDateString(new Date()); }

    function formatDate(dateStr) {
      const d = new Date(dateStr + "T00:00:00");
      return `${d.getMonth() + 1}/${d.getDate()}`;
    }

    function migrateOldData() {
      if (!localStorage.getItem(STORAGE_KEY)) {
        for (const key of OLD_KEYS) {
          const old = localStorage.getItem(key);
          if (old) { localStorage.setItem(STORAGE_KEY, old); break; }
        }
      }
      if (!localStorage.getItem(TARGET_KEY)) {
        for (const key of OLD_TARGET_KEYS) {
          const old = localStorage.getItem(key);
          if (old) { localStorage.setItem(TARGET_KEY, old); break; }
        }
      }
    }

    function getEntries() {
      return JSON.parse(localStorage.getItem(STORAGE_KEY) || "[]")
        .sort((a, b) => a.date.localeCompare(b.date));
    }

    function setEntries(entries) { localStorage.setItem(STORAGE_KEY, JSON.stringify(entries)); }

    function getTarget() {
      const saved = localStorage.getItem(TARGET_KEY);
      if (!saved) return { min: 43, max: 48 };

      const target = JSON.parse(saved);

      // 只修正「目標區間」的舊預設值，不修正任何體重紀錄
      if (target.min === 48) target.min = 43;
      if (target.max === 50) target.max = 48;

      return target;
    }
    function setTarget(min, max) { localStorage.setItem(TARGET_KEY, JSON.stringify({ min, max })); }

    function movingAverage(entries, index, days) {
      const slice = entries.slice(Math.max(0, index - days + 1), index + 1);
      if (!slice.length) return null;
      const sum = slice.reduce((acc, item) => acc + item.weight, 0);
      return +(sum / slice.length).toFixed(2);
    }

    function saveEntry() {
      const date = $("dateInput").value;
      const weight = Number($("weightInput").value);
      const targetMin = Number($("targetMinInput").value);
      const targetMax = Number($("targetMaxInput").value);

      if (!date || !weight || weight <= 0) { showMessage("請輸入有效日期與體重。", "bad"); return; }
      if (targetMin && targetMax && targetMin < targetMax) setTarget(targetMin, targetMax);

      const entries = getEntries();
      const existing = entries.find((item) => item.date === date);
      if (existing) existing.weight = weight;
      else entries.push({ date, weight });

      setEntries(entries);
      selectedDate = date;
      calendarDate = new Date(date + "T00:00:00");
      $("weightInput").value = "";
      showMessage("已儲存。看趨勢，不看單日波動。", "good");
      render();
    }

    function deleteEntry(date) {
      const entries = getEntries().filter((item) => item.date !== date);
      setEntries(entries);
      if (selectedDate === date) selectedDate = null;
      render();
    }

    function clearAllData() {
      if (!confirm("確定要清空所有體重資料嗎？")) return;
      localStorage.removeItem(STORAGE_KEY);
      selectedDate = null;
      render();
      showMessage("資料已清空。", "warn");
    }

    function fillDemoData() {
      const base = new Date();
      const demo = [];
      for (let i = 55; i >= 0; i--) {
        const d = new Date(base);
        d.setDate(base.getDate() - i);
        const date = toLocalDateString(d);
        const trend = 51.8 - (55 - i) * 0.025;
        const noise = Math.sin(i * 1.7) * 0.28 + Math.cos(i * 0.7) * 0.12;
        demo.push({ date, weight: +(trend + noise).toFixed(1) });
      }
      setEntries(demo);
      calendarDate = new Date();
      render();
      showMessage("已載入範例資料，可先看圖表效果。", "good");
    }

    function showMessage(text, type = "") {
      const el = $("message");
      el.className = `hint ${type}`;
      el.textContent = text;
    }

    function renderStats(entries) {
      const target = getTarget();
      if (!entries.length) {
        $("latestWeight").textContent = "--"; $("avg7").textContent = "--"; $("avg14").textContent = "--"; $("weeklyChange").textContent = "--";
        $("trendHint").className = "hint"; $("trendHint").textContent = "資料累積後，這裡會自動判斷趨勢。";
        return;
      }

      const latest = entries[entries.length - 1];
      const avg7 = movingAverage(entries, entries.length - 1, 7);
      const avg14 = movingAverage(entries, entries.length - 1, 14);
      const prevIndex = Math.max(0, entries.length - 8);
      const weeklyChange = +(latest.weight - entries[prevIndex].weight).toFixed(1);

      const latestVal = latest.weight.toFixed(1);
      $("latestWeight").textContent = latestVal;

      // 超出目標區間標紅
      const latestCard = $("latestWeight").closest(".stat");
      if (latest.weight > target.max || latest.weight < target.min) {
        $("latestWeight").style.color = "#c57272";
        latestCard.classList.add("alert");
      } else {
        $("latestWeight").style.color = "";
        latestCard.classList.remove("alert");
      }
      $("avg7").textContent = avg7 ? avg7.toFixed(1) : "--";
      $("avg14").textContent = avg14 ? avg14.toFixed(1) : "--";
      $("weeklyChange").textContent = `${weeklyChange > 0 ? "+" : ""}${weeklyChange.toFixed(1)}`;

      const hint = $("trendHint");
      if (entries.length < 7) { hint.className = "hint"; hint.textContent = "先累積 7 天資料，趨勢會更準。"; }
      else if (latest.weight > avg7 + 0.6) { hint.className = "hint warn"; hint.textContent = "今日體重明顯高於 7 日平均，較像水分、鹽分或週期波動。"; }
      else if (avg7 < avg14 - 0.15) { hint.className = "hint good"; hint.textContent = "7 日平均低於 14 日平均，短期趨勢正在往下。"; }
      else if (avg7 > avg14 + 0.15) { hint.className = "hint bad"; hint.textContent = "7 日平均高於 14 日平均，近期趨勢偏上。先檢查水分、鹽分、睡眠與週期。"; }
      else { hint.className = "hint"; hint.textContent = "目前趨勢大致持平。單日波動不用放大。"; }
    }

    function renderChart(entries) {
      const target = getTarget();
      const labels = entries.map((item) => formatDate(item.date));
      const weights = entries.map((item) => item.weight);
      const avg7 = entries.map((_, index) => movingAverage(entries, index, 7));
      const avg14 = entries.map((_, index) => movingAverage(entries, index, 14));
      const targetMin = entries.map(() => target.min);
      const targetMax = entries.map(() => target.max);

      const ctx = $("weightChart").getContext("2d");
      if (chart) chart.destroy();
      chart = new Chart(ctx, {
        type: "line",
        data: { labels, datasets: [
          { label: "體重", data: weights, tension: 0.35, borderWidth: 2.5, pointRadius: 4 },
          { label: "7日平均", data: avg7, tension: 0.35, borderWidth: 2.5, pointRadius: 0 },
          { label: "14日平均", data: avg14, tension: 0.35, borderWidth: 2.5, pointRadius: 0 },
          { label: "目標下限", data: targetMin, borderDash: [6, 6], pointRadius: 0, borderWidth: 1.5 },
          { label: "目標上限", data: targetMax, borderDash: [6, 6], pointRadius: 0, borderWidth: 1.5 }
        ]},
        options: {
          responsive: true, maintainAspectRatio: false,
          plugins: { legend: { position: "bottom" }, tooltip: { mode: "index", intersect: false } },
          interaction: { mode: "nearest", axis: "x", intersect: false },
          scales: { y: { suggestedMin: weights.length ? Math.min(...weights, target.min) - 1 : undefined, suggestedMax: weights.length ? Math.max(...weights, target.max) + 1 : undefined, ticks: { callback: (value) => `${value} kg` } } }
        }
      });
    }

    function renderRangeAndWeekly(entries) {
      const target = getTarget();
      const latest = entries[entries.length - 1];
      const status = $("rangeStatus");
      const current = $("rangeCurrent");
      const dot = $("rangeDot");
      const weeklyBox = $("weeklyDirectionBox");

      if (!latest) {
        status.textContent = "尚無資料";
        current.textContent = "-- kg";
        dot.style.left = "50%";
        dot.classList.remove("alert");
        weeklyBox.innerHTML = `<div class="week-card neutral"><div class="week-title">趨勢</div><div class="week-value">先記 7 天</div></div>`;
        return;
      }

      current.textContent = `${latest.weight.toFixed(1)} kg`;
      const displayMin = target.min - 2;
      const displayMax = target.max + 2;
      let pct = ((latest.weight - displayMin) / (displayMax - displayMin)) * 100;
      pct = Math.max(0, Math.min(100, pct));
      dot.style.left = `${pct}%`;

      if (latest.weight > target.max) {
        status.textContent = `高於目標上限 ${(latest.weight - target.max).toFixed(1)} kg`;
        dot.classList.add("alert");
      } else if (latest.weight < target.min) {
        status.textContent = `低於目標下限 ${(target.min - latest.weight).toFixed(1)} kg`;
        dot.classList.add("alert");
      } else {
        status.textContent = "目前在目標區間內";
        dot.classList.remove("alert");
      }

      const last7 = entries.slice(-7);
      const prev7 = entries.slice(-14, -7);
      const latestChange = entries.length >= 2 ? +(entries[entries.length - 1].weight - entries[entries.length - 2].weight).toFixed(1) : null;
      const weekChange = last7.length >= 2 ? +(last7[last7.length - 1].weight - last7[0].weight).toFixed(1) : null;
      const avgChange = prev7.length && last7.length ? +((last7.reduce((a,b)=>a+b.weight,0)/last7.length) - (prev7.reduce((a,b)=>a+b.weight,0)/prev7.length)).toFixed(1) : null;

      function card(title, value) {
        let cls = "neutral";
        let arrow = "➡️";
        if (value !== null && value < -0.1) { cls = "good"; arrow = "⬇️"; }
        if (value !== null && value > 0.1) { cls = "bad"; arrow = "⬆️"; }
        const text = value === null ? "資料不足" : `${arrow} ${value > 0 ? "+" : ""}${value.toFixed(1)} kg`;
        return `<div class="week-card ${cls}"><div class="week-title">${title}</div><div class="week-value">${text}</div></div>`;
      }

      weeklyBox.innerHTML = [
        card("較昨日", latestChange),
        card("近7天", weekChange),
        card("7日均值 vs 前7日", avgChange)
      ].join("");
    }

    function changeMonth(delta) {
      calendarDate = new Date(calendarDate.getFullYear(), calendarDate.getMonth() + delta, 1);
      renderCalendar(getEntries());
    }

    function goThisMonth() {
      calendarDate = new Date();
      renderCalendar(getEntries());
    }

    function selectCalendarDate(dateStr) {
      selectedDate = dateStr;
      const entries = getEntries();
      const item = entries.find(e => e.date === dateStr);
      $("dateInput").value = dateStr;
      if (item) $("weightInput").value = item.weight;
      else $("weightInput").value = "";
      renderCalendar(entries);
      const info = $("selectedDayInfo");
      if (item) {
        info.className = "hint good";
        info.textContent = `${dateStr}：${item.weight.toFixed(1)} kg。已帶入上方欄位，可直接編輯。`;
      } else {
        info.className = "hint";
        info.textContent = `${dateStr} 尚無紀錄。已帶入日期，可直接新增。`;
      }
    }

    function renderCalendar(entries) {
      const cal = $("calendar");
      cal.innerHTML = "";
      const names = ["日", "一", "二", "三", "四", "五", "六"];
      names.forEach((name) => {
        const el = document.createElement("div");
        el.className = "day-name";
        el.textContent = name;
        cal.appendChild(el);
      });

      const year = calendarDate.getFullYear();
      const month = calendarDate.getMonth();
      const monthNames = ["一月", "二月", "三月", "四月", "五月", "六月", "七月", "八月", "九月", "十月", "十一月", "十二月"];
      $("calendarTitle").textContent = `${year} 年 ${monthNames[month]}`;

      const first = new Date(year, month, 1);
      const last = new Date(year, month + 1, 0);
      const byDate = Object.fromEntries(entries.map((item) => [item.date, item]));

      for (let i = 0; i < first.getDay(); i++) {
        const empty = document.createElement("div");
        empty.className = "day empty";
        cal.appendChild(empty);
      }

      for (let day = 1; day <= last.getDate(); day++) {
        const dateObj = new Date(year, month, day);
        const dateStr = toLocalDateString(dateObj);
        const item = byDate[dateStr];
        const prevObj = new Date(year, month, day - 1);
        const prev = byDate[toLocalDateString(prevObj)];
        const el = document.createElement("div");
        el.className = "day";
        if (selectedDate === dateStr) el.classList.add("selected");

        if (item && prev) {
          const diff = +(item.weight - prev.weight).toFixed(1);
          if (diff < -0.1) el.classList.add("down");
          else if (diff > 0.1) el.classList.add("up");
          else el.classList.add("same");
        } else if (item) el.classList.add("same");

        const target = getTarget();
        if (item && (item.weight > target.max || item.weight < target.min)) {
          el.classList.add("alert");
        }

        el.innerHTML = `<div class="num">${day}</div>${item ? `<div class="kg">${item.weight.toFixed(1)}</div>` : ""}`;
        el.onclick = () => selectCalendarDate(dateStr);
        cal.appendChild(el);
      }
    }

    function renderHistory(entries) {
      const box = $("history");
      if (!entries.length) { box.innerHTML = `<div class="muted">尚無資料。</div>`; return; }
      box.innerHTML = entries.slice().reverse().map((item) => `
        <div class="record">
          <div><div class="muted">${item.date}</div><strong>${item.weight.toFixed(1)} kg</strong></div>
          <div class="row">
            <button class="secondary" onclick="editEntry('${item.date}', ${item.weight})">編輯</button>
            <button class="danger" onclick="deleteEntry('${item.date}')">刪除</button>
          </div>
        </div>
      `).join("");
    }

    function editEntry(date, weight) {
      selectedDate = date;
      calendarDate = new Date(date + "T00:00:00");
      $("dateInput").value = date;
      $("weightInput").value = weight;
      renderCalendar(getEntries());
      window.scrollTo({ top: 0, behavior: "smooth" });
    }

    function render() {
      const entries = getEntries();
      const target = getTarget();
      $("targetMinInput").value = target.min;
      $("targetMaxInput").value = target.max;
      renderStats(entries);
      renderChart(entries);
      renderRangeAndWeekly(entries);
      renderCalendar(entries);
      renderHistory(entries);
    }

    function init() {
      migrateOldData();
      $("dateInput").value = todayString();
      render();
    }

    
    init();
  </script>
</body>
</html>
